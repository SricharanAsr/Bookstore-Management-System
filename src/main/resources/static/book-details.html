<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skybrisk Bookstore | Book Details</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
</head>

<body class="theme-dark">
    <nav class="navbar">
        <a href="hub.html" class="logo" style="text-decoration: none;">Skybrisk<span>Bookstore</span></a>
        <ul class="nav-links">
            <li><a href="hub.html">Home</a></li>
            <li><a href="books.html">Books</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li id="adminLink" class="hidden"><a href="admin.html">Dashboard</a></li>
            <li>
                <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                    <span class="icon">🌓</span>
                </button>
            </li>
            <li class="login-btn"><a href="#" id="authBtn">Logout</a></li>
        </ul>
    </nav>

    <main id="mainApp"
        style="padding-top: 160px; max-width: 1200px; margin: 0 auto; padding-left: 5%; padding-right: 5%;">
        <section class="book-detail-grid" id="bookDetailContent"
            style="background: var(--bg-alt); border: 2px solid var(--primary); border-radius: 40px; overflow: hidden; box-shadow: var(--shadow-premium);">
            <div class="book-detail-img"
                style="background: #000; padding: 2rem; display: flex; align-items: center; justify-content: center;">
                <img id="detailImg" src="" alt="Book Cover"
                    style="max-height: 600px; box-shadow: 10px 10px 40px rgba(0,0,0,0.8);">
            </div>
            <div class="book-detail-info" style="padding: 4rem;">
                <h2 id="detailTitle" style="font-size: 3rem; margin-bottom: 1rem;">Book Title</h2>
                <p class="author"
                    style="font-family: var(--font-serif); font-style: italic; color: var(--text-muted); font-size: 1.2rem; margin-bottom: 2rem;">
                    by <span id="detailAuthor">Author</span></p>
                <div class="tags" style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                    <span class="tag genre status-badge" id="detailGenre"
                        style="background: rgba(196, 161, 99, 0.1); color: var(--primary);">Genre</span>
                    <span class="tag isbn status-badge" id="detailIsbn"
                        style="background: rgba(148, 163, 184, 0.1); color: var(--text-muted);">ISBN</span>
                </div>
                <div class="price-stock"
                    style="background: rgba(196, 161, 99, 0.1); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1.5rem 2.5rem; display: flex; gap: 3rem; align-items: center; margin-bottom: 3rem;">
                    <div class="price" id="detailPrice"
                        style="color: var(--primary); font-size: 3rem; font-weight: 900;">$0.00</div>
                    <div class="stock" id="detailStock" style="font-size: 1.1rem; color: var(--text-muted);">Stock: 0
                    </div>
                </div>
                <div class="description" style="margin-bottom: 4rem;">
                    <h3 style="color: var(--primary); margin-bottom: 1rem; font-size: 1.5rem;">The Narrative</h3>
                    <p id="detailDescription"
                        style="font-family: var(--font-serif); line-height: 1.8; color: var(--text-muted); font-size: 1.1rem;">
                        Detailed description goes here...</p>
                </div>
                <div id="detailAction" class="detail-action">
                    <!-- Order button injected via JS -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Skybrisk Management System. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        // Extract bookId from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');

        // Wait for app.js to fetch books if needed, or handle it here
        async function loadBookOnPage() {
            if (!bookId) return;
            // We need to ensure allBooks is populated. In app.js, it might still be fetching.
            // Let's refine app.js to be more robust for this.
        }
    </script>
</body>

</html>
